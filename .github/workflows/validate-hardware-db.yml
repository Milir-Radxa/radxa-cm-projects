name: Validate Hardware DB

on:
  push:
  pull_request:

jobs:
  validate-hardware-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema

      - name: Validate hardware db
        run: python tools/validate_db.py

      - name: Check generated snippets are up to date
        run: python tools/generate_readme_snippets.py --check
